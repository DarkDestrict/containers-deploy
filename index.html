<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopHub - Online Shopping</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
        }
        
        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: bold;
        }
        
        .header-right {
            display: flex;
            gap: 2rem;
            align-items: center;
        }
        
        .search-box {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            width: 250px;
        }
        
        .cart-icon {
            cursor: pointer;
            position: relative;
        }
        
        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background-color: #e74c3c;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }
        
        .container {
            display: flex;
            max-width: 1400px;
            margin: 2rem auto;
            gap: 2rem;
            padding: 0 2rem;
        }
        
        .sidebar {
            width: 200px;
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            height: fit-content;
        }
        
        .sidebar h3 {
            margin-bottom: 1rem;
            color: #2c3e50;
        }
        
        .filter-group {
            margin-bottom: 1.5rem;
        }
        
        .filter-group label {
            display: block;
            margin-bottom: 0.5rem;
            cursor: pointer;
        }
        
        .filter-group input {
            margin-right: 0.5rem;
        }
        
        .main-content {
            flex: 1;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
        }
        
        .product-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
        }
        
        .product-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
        }
        
        .product-info {
            padding: 1rem;
        }
        
        .product-name {
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #2c3e50;
        }
        
        .product-price {
            color: #e74c3c;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        
        .product-rating {
            color: #f39c12;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        
        .add-to-cart-btn {
            width: 100%;
            padding: 0.7rem;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        
        .add-to-cart-btn:hover {
            background-color: #2980b9;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .close-btn {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
            color: #7f8c8d;
        }
        
        .close-btn:hover {
            color: #2c3e50;
        }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid #ecf0f1;
            align-items: center;
        }
        
        .cart-item-info {
            flex: 1;
        }
        
        .cart-item-controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        
        .qty-btn {
            width: 25px;
            height: 25px;
            border: 1px solid #bdc3c7;
            background: white;
            cursor: pointer;
            border-radius: 3px;
        }
        
        .remove-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 0.3rem 0.6rem;
            border-radius: 3px;
            cursor: pointer;
        }
        
        .cart-summary {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 2px solid #2c3e50;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        
        .checkout-btn {
            width: 100%;
            padding: 1rem;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }
        
        .checkout-btn:hover {
            background-color: #229954;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">🛍️ ShopHub</div>
        <div class="header-right">
            <input type="text" class="search-box" id="searchBox" placeholder="Search products...">
            <div class="cart-icon" id="cartIcon">
                🛒
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </header>
    
    <div class="container">
        <aside class="sidebar">
            <h3>Categories</h3>
            <div class="filter-group">
                <label><input type="checkbox" value="electronics" class="category-filter"> Electronics</label>
                <label><input type="checkbox" value="clothing" class="category-filter"> Clothing</label>
                <label><input type="checkbox" value="books" class="category-filter"> Books</label>
                <label><input type="checkbox" value="home" class="category-filter"> Home & Garden</label>
            </div>
            
            <h3>Price Range</h3>
            <div class="filter-group">
                <label><input type="radio" name="price" value="all" class="price-filter" checked> All Prices</label>
                <label><input type="radio" name="price" value="0-50" class="price-filter"> $0 - $50</label>
                <label><input type="radio" name="price" value="50-100" class="price-filter"> $50 - $100</label>
                <label><input type="radio" name="price" value="100+" class="price-filter"> $100+</label>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="products-grid" id="productsGrid"></div>
        </main>
    </div>
    
    <div class="modal" id="cartModal">
        <div class="modal-content">
            <span class="close-btn" id="closeCart">&times;</span>
            <h2>Shopping Cart</h2>
            <div id="cartItems"></div>
            <div class="cart-summary">
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Tax (10%):</span>
                    <span id="tax">$0.00</span>
                </div>
                <div class="summary-row" style="font-size: 1.2rem; color: #e74c3c;">
                    <span>Total:</span>
                    <span id="total">$0.00</span>
                </div>
                <button class="checkout-btn">Proceed to Checkout</button>
            </div>
        </div>
    </div>
    
    <script>
        const products = [
            { id: 1, name: 'Wireless Laptop', price: 299.99, category: 'electronics', rating: '⭐⭐⭐⭐⭐', emoji: '💻' },
            { id: 2, name: 'Smart Watch', price: 199.99, category: 'electronics', rating: '⭐⭐⭐⭐', emoji: '⌚' },
            { id: 3, name: 'Denim Jacket', price: 79.99, category: 'clothing', rating: '⭐⭐⭐⭐⭐', emoji: '👕' },
            { id: 4, name: 'Running Shoes', price: 89.99, category: 'clothing', rating: '⭐⭐⭐⭐', emoji: '👟' },
            { id: 5, name: 'Programming Book', price: 39.99, category: 'books', rating: '⭐⭐⭐⭐⭐', emoji: '📚' },
            { id: 6, name: 'Design Book', price: 34.99, category: 'books', rating: '⭐⭐⭐⭐', emoji: '📖' },
            { id: 7, name: 'Garden Tool Set', price: 49.99, category: 'home', rating: '⭐⭐⭐⭐', emoji: '🌱' },
            { id: 8, name: 'LED Lamp', price: 59.99, category: 'home', rating: '⭐⭐⭐⭐⭐', emoji: '💡' },
            { id: 9, name: 'Bluetooth Speaker', price: 129.99, category: 'electronics', rating: '⭐⭐⭐⭐', emoji: '🔊' },
            { id: 10, name: 'Winter Coat', price: 159.99, category: 'clothing', rating: '⭐⭐⭐⭐⭐', emoji: '🧥' },
            { id: 11, name: 'Coffee Table', price: 199.99, category: 'home', rating: '⭐⭐⭐⭐', emoji: '🪑' },
            { id: 12, name: 'Headphones', price: 179.99, category: 'electronics', rating: '⭐⭐⭐⭐⭐', emoji: '🎧' }
        ];
        
        let cart = [];
        const cartModal = document.getElementById('cartModal');
        const closeCartBtn = document.getElementById('closeCart');
        const cartIcon = document.getElementById('cartIcon');
        
        function renderProducts(productsToShow = products) {
            const productsGrid = document.getElementById('productsGrid');
            productsGrid.innerHTML = productsToShow.map(product => `
                <div class="product-card">
                    <div class="product-image">${product.emoji}</div>
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">$${product.price.toFixed(2)}</div>
                        <div class="product-rating">${product.rating}</div>
                        <button class="add-to-cart-btn" onclick="addToCart(${product.id})">Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }
        
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCartUI();
        }
        
        function updateCartUI() {
            const cartCount = document.getElementById('cartCount');
            cartCount.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
            
            const cartItems = document.getElementById('cartItems');
            
            if (cart.length === 0) {
                cartItems.innerHTML = '<p>Your cart is empty</p>';
            } else {
                cartItems.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <strong>${item.name}</strong><br>
                            $${item.price.toFixed(2)} x ${item.quantity}
                        </div>
                        <div class="cart-item-controls">
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                            <button class="remove-btn" onclick="removeFromCart(${item.id})">Remove</button>
                        </div>
                    </div>
                `).join('');
            }
            
            updateCartSummary();
        }
        
        function updateQuantity(productId, change) {
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    updateCartUI();
                }
            }
        }
        
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartUI();
        }
        
        function updateCartSummary() {
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const tax = subtotal * 0.10;
            const total = subtotal + tax;
            
            document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById('tax').textContent = `$${tax.toFixed(2)}`;
            document.getElementById('total').textContent = `$${total.toFixed(2)}`;
        }
        
        function filterProducts() {
            const selectedCategories = Array.from(document.querySelectorAll('.category-filter:checked')).map(el => el.value);
            const selectedPrice = document.querySelector('.price-filter:checked').value;
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            
            let filtered = products.filter(product => {
                const categoryMatch = selectedCategories.length === 0 || selectedCategories.includes(product.category);
                const searchMatch = product.name.toLowerCase().includes(searchTerm);
                
                let priceMatch = true;
                if (selectedPrice === '0-50') priceMatch = product.price <= 50;
                else if (selectedPrice === '50-100') priceMatch = product.price > 50 && product.price <= 100;
                else if (selectedPrice === '100+') priceMatch = product.price > 100;
                
                return categoryMatch && searchMatch && priceMatch;
            });
            
            renderProducts(filtered);
        }
        
        cartIcon.addEventListener('click', () => cartModal.classList.add('active'));
        closeCartBtn.addEventListener('click', () => cartModal.classList.remove('active'));
        cartModal.addEventListener('click', (e) => {
            if (e.target === cartModal) cartModal.classList.remove('active');
        });
        
        document.querySelectorAll('.category-filter, .price-filter').forEach(el => {
            el.addEventListener('change', filterProducts);
        });
        
        document.getElementById('searchBox').addEventListener('input', filterProducts);
        
        renderProducts();
    </script>
</body>
</html>
