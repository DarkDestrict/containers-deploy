<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumping Ball in Court</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }

        .court {
            width: 600px;
            height: 400px;
            border: 3px solid #333;
            background-color: #d0a574;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .ball {
            width: 30px;
            height: 30px;
            background-color: #ff6b6b;
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            animation: jump 1s ease-in-out infinite;
            box-shadow: inset -2px -2px 5px rgba(0, 0, 0, 0.2);
        }

        @keyframes jump {
            0%, 100% {
                bottom: 0;
            }
            50% {
                bottom: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="court">
        <div class="ball"></div>
    </div>
</body>
</html>
